# =====================================================
# MavlinkProject 配置文件
# =====================================================

# 数据库配置
database:
  mysql:
    host: "localhost"
    port: "3306"
    user: "root"
    password: ""
    database: "mavlink_project"
    charset: "utf8mb4"
    max_idle_conns: 10
    max_open_conns: 100
    conn_max_lifetime: 3600

# Redis 配置
redis:
  host: "localhost"
  port: "6379"
  password: ""
  db_allocation:
    general_warning: 0
    backend: 1
    frontend: 2
    agent: 3
    drone: 4
    sensor: 5
    token: 14
    verification: 15

# JWT 认证配置
jwt:
  secret_key: "your-secret-key-change-in-production"
  expire_time: 3600          # 秒 (1小时)
  refresh_time: 86400        # 秒 (24小时)
  identity_key: "user_id"

# CORS 跨域配置
cors:
  allow_origins:
    - "http://localhost:3000"
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allow_headers:
    - "Origin"
    - "Content-Type"
    - "Accept"
    - "Authorization"
    - "X-Requested-With"
  expose_headers:
    - "Content-Length"
  allow_credentials: true
  max_age: 43200             # 秒 (12小时)

# 速率限制配置
rate_limit:
  enabled: true
  redis_prefix: "rate_limit:"
  enable_global_limit: true
  default_rule:
    limit_type: "ip"
    capacity: 10000
    fill_rate: 400.0
    window_seconds: 60

# 日志配置
logger:
  level: "INFO"              # DEBUG, INFO, WARN, ERROR
  log_dir: "./OutputLogs"
  max_file_size: 104857600   # 100MB
  access_threshold: 1000
  url_error_threshold: 50
  slow_request_threshold: 1.0 # 秒
  monitor_window: 15          # 分钟

# 静态资源配置
resources:
  static_dir: "./Resources"

# 验证配置
verification:
  code_length: 6
  code_expire_time: 300       # 秒 (5分钟)
  max_request_per_minute: 5
