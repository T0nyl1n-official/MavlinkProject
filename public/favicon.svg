<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- 盾牌背景 -->
  <rect x="4" y="3" width="24" height="28" rx="4" fill="#1E3A8A" stroke="#D4AF37" stroke-width="1"/>
  <rect x="5" y="4" width="22" height="26" rx="3" fill="#0F172A"/>
  
  <!-- 网格背景 -->
  <g stroke="#3B82F6" stroke-width="0.5" opacity="0.3">
    <line x1="4" y1="10" x2="28" y2="10"/>
    <line x1="4" y1="16" x2="28" y2="16"/>
    <line x1="4" y1="22" x2="28" y2="22"/>
    <line x1="10" y1="3" x2="10" y2="31"/>
    <line x1="16" y1="3" x2="16" y2="31"/>
    <line x1="22" y1="3" x2="22" y2="31"/>
  </g>
  
  <!-- 顶部无人机图标 -->
  <g transform="translate(16, 10)">
    <!-- 无人机主体 -->
    <circle cx="0" cy="0" r="2" fill="#D4AF37"/>
    <!-- 无人机螺旋桨 -->
    <rect x="-3" y="-1" width="2" height="2" rx="0.5" fill="#D4AF37"/>
    <rect x="1" y="-1" width="2" height="2" rx="0.5" fill="#D4AF37"/>
    <rect x="-1" y="-3" width="2" height="2" rx="0.5" fill="#D4AF37"/>
    <rect x="-1" y="1" width="2" height="2" rx="0.5" fill="#D4AF37"/>
    <!-- 无人机摄像头 -->
    <circle cx="0" cy="0" r="0.8" fill="#3B82F6"/>
  </g>
  
  <!-- 左下角图标 -->
  <g transform="translate(10, 20)">
    <circle cx="0" cy="0" r="2.5" fill="#D4AF37"/>
    <!-- 灯塔 -->
    <rect x="-1" y="-2" width="2" height="3" rx="0.5" fill="#0F172A"/>
    <rect x="-1.5" y="1" width="3" height="2" rx="0.5" fill="#0F172A"/>
  </g>
  
  <!-- 右下角图标 -->
  <g transform="translate(22, 20)">
    <circle cx="0" cy="0" r="2.5" fill="#D4AF37"/>
    <!-- 声波 -->
    <circle cx="0" cy="0" r="1" fill="#0F172A"/>
    <circle cx="0" cy="0" r="1.5" fill="none" stroke="#0F172A" stroke-width="0.5"/>
  </g>
  
  <!-- 中间大脑图标 -->
  <g transform="translate(16, 16)">
    <circle cx="0" cy="0" r="2.5" fill="#D4AF37"/>
    <!-- 大脑 -->
    <path d="M-2,-1.5 Q-2.5,0 -2,1.5 Q0,2 2,1.5 Q2.5,0 2,-1.5 Q0,-2 -2,-1.5" fill="#3B82F6"/>
  </g>
  
  <!-- 连接线 -->
  <path d="M16,12 L10,16" stroke="#D4AF37" stroke-width="0.5"/>
  <path d="M16,12 L22,16" stroke="#D4AF37" stroke-width="0.5"/>
  <path d="M10,16 L22,16" stroke="#D4AF37" stroke-width="0.5"/>
  
  <!-- 铆钉 -->
  <circle cx="6" cy="5" r="0.3" fill="#D4AF37"/>
  <circle cx="26" cy="5" r="0.3" fill="#D4AF37"/>
  <circle cx="6" cy="27" r="0.3" fill="#D4AF37"/>
  <circle cx="26" cy="27" r="0.3" fill="#D4AF37"/>
  <circle cx="16" cy="3" r="0.3" fill="#D4AF37"/>
  <circle cx="16" cy="29" r="0.3" fill="#D4AF37"/>
</svg>