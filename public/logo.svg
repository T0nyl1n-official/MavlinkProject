<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- 盾牌背景 -->
  <rect x="40" y="30" width="120" height="140" rx="20" fill="#1E3A8A" stroke="#D4AF37" stroke-width="4"/>
  <rect x="44" y="34" width="112" height="132" rx="16" fill="#0F172A"/>
  
  <!-- 网格背景 -->
  <g stroke="#3B82F6" stroke-width="1" opacity="0.3">
    <line x1="40" y1="70" x2="160" y2="70"/>
    <line x1="40" y1="110" x2="160" y2="110"/>
    <line x1="40" y1="150" x2="160" y2="150"/>
    <line x1="80" y1="30" x2="80" y2="170"/>
    <line x1="120" y1="30" x2="120" y2="170"/>
  </g>
  
  <!-- 顶部无人机图标 -->
  <g transform="translate(100, 70)">
    <!-- 无人机主体 -->
    <circle cx="0" cy="0" r="12" fill="#D4AF37"/>
    <!-- 无人机螺旋桨 -->
    <rect x="-20" y="-4" width="10" height="8" rx="2" fill="#D4AF37"/>
    <rect x="10" y="-4" width="10" height="8" rx="2" fill="#D4AF37"/>
    <rect x="-4" y="-20" width="8" height="10" rx="2" fill="#D4AF37"/>
    <rect x="-4" y="10" width="8" height="10" rx="2" fill="#D4AF37"/>
    <!-- 无人机摄像头 -->
    <circle cx="0" cy="0" r="4" fill="#3B82F6"/>
  </g>
  
  <!-- 左下角图标 -->
  <g transform="translate(70, 130)">
    <circle cx="0" cy="0" r="15" fill="#D4AF37"/>
    <!-- 灯塔 -->
    <rect x="-5" y="-10" width="10" height="12" rx="2" fill="#0F172A"/>
    <rect x="-8" y="2" width="16" height="8" rx="2" fill="#0F172A"/>
    <!-- 齿轮 -->
    <circle cx="0" cy="0" r="4" fill="#0F172A"/>
    <circle cx="0" cy="-8" r="2" fill="#0F172A"/>
    <circle cx="8" cy="0" r="2" fill="#0F172A"/>
    <circle cx="0" cy="8" r="2" fill="#0F172A"/>
    <circle cx="-8" cy="0" r="2" fill="#0F172A"/>
  </g>
  
  <!-- 右下角图标 -->
  <g transform="translate(130, 130)">
    <circle cx="0" cy="0" r="15" fill="#D4AF37"/>
    <!-- 声波 -->
    <circle cx="0" cy="0" r="6" fill="#0F172A"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#0F172A" stroke-width="2"/>
    <circle cx="0" cy="0" r="13" fill="none" stroke="#0F172A" stroke-width="2"/>
  </g>
  
  <!-- 中间大脑图标 -->
  <g transform="translate(100, 110)">
    <circle cx="0" cy="0" r="15" fill="#D4AF37"/>
    <!-- 大脑 -->
    <path d="M-10,-8 Q-12,0 -10,8 Q0,10 10,8 Q12,0 10,-8 Q0,-10 -10,-8" fill="#3B82F6"/>
    <path d="M-8,-4 Q-9,0 -8,4 Q0,5 8,4 Q9,0 8,-4 Q0,-5 -8,-4" fill="#1E40AF"/>
  </g>
  
  <!-- 连接线 -->
  <path d="M100,82 L70,115" stroke="#D4AF37" stroke-width="2"/>
  <path d="M100,82 L130,115" stroke="#D4AF37" stroke-width="2"/>
  <path d="M70,115 L130,115" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- 铆钉 -->
  <circle cx="50" cy="40" r="2" fill="#D4AF37"/>
  <circle cx="150" cy="40" r="2" fill="#D4AF37"/>
  <circle cx="50" cy="160" r="2" fill="#D4AF37"/>
  <circle cx="150" cy="160" r="2" fill="#D4AF37"/>
  <circle cx="100" cy="30" r="2" fill="#D4AF37"/>
  <circle cx="100" cy="170" r="2" fill="#D4AF37"/>
</svg>