server:
  port: "8084"
  domain: "central.deeppluse.dpdns.org"
  email: "your-email@example.com"
  cert_file: "httpsConfig/cert.pem"
  key_file: "httpsConfig/key.pem"

mavlink:
  serial_port: "/dev/ttyUSB0"
  serial_baud: 115200
  target_system: 1

backend:
  address: "https://api.deeppluse.dpdns.org"
  token: "your-device-token"
  device_id: "central_001"
  device_type: "central"

drone:
  search:
    min_battery_level: 20.0
    max_drone_distance: 1000.0
    status_check_timeout: 5
    status_update_interval: 2
    message_chan_size: 1000
    score_weight: 10.0

central:
  address: "0.0.0.0"
  port: "8081"
  task:
    max_retries: 3
    timeout: 30
  drone:
    min_battery_level: 20.0
    max_drone_distance: 1000.0
    status_check_timeout: 10

pixhawk:
  enabled: false
  serial_port: "/dev/serial0"
  serial_baud: 57600

backend_server:
  address: "api.deeppluse.dpdns.org"
  port: "8080"
